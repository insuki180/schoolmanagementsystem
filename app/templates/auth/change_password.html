{% extends "base.html" %}
{% block title %}Change Password — SchoolMS{% endblock %}
{% block content %}
<div class="max-w-md mx-auto fade-in">
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-slate-800">Change Password</h1>
        <p class="text-slate-500 text-sm mt-1">Please set a new password to continue</p>
    </div>

    {% if error %}
    <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm flex items-center gap-2">
        <span>⚠️</span> {{ error }}
    </div>
    {% endif %}

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <form method="POST" action="/change-password" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Current Password</label>
                <input type="password" name="current_password" required
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-primary-400 focus:ring-2 focus:ring-primary-100 outline-none transition-all text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">New Password</label>
                <input type="password" name="new_password" required minlength="6"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-primary-400 focus:ring-2 focus:ring-primary-100 outline-none transition-all text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Confirm New Password</label>
                <input type="password" name="confirm_password" required minlength="6"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-primary-400 focus:ring-2 focus:ring-primary-100 outline-none transition-all text-sm">
            </div>
            <button type="submit"
                class="w-full py-3 bg-gradient-to-r from-primary-600 to-primary-700 text-white font-semibold rounded-xl hover:from-primary-700 hover:to-primary-800 transition-all shadow-lg shadow-primary-500/25 active:scale-[0.98]">
                Update Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
