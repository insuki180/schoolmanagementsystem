{% extends "base.html" %}
{% block title %}Sign In — SchoolMS{% endblock %}
{% block content %}
<div class="w-full max-w-md mx-auto fade-in">

  <!-- Logo Header -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-primary-600 to-violet-600 shadow-lg shadow-primary-500/30 mb-4">
      <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.436 60.436 0 00-.491 6.347A48.627 48.627 0 0112 20.904a48.627 48.627 0 018.232-4.41 60.46 60.46 0 00-.491-6.347m-15.482 0a50.57 50.57 0 00-2.658-.813A59.905 59.905 0 0112 3.493a59.902 59.902 0 0110.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.697 50.697 0 0112 13.489a50.702 50.702 0 017.74-3.342M6.75 15a.75.75 0 100-1.5.75.75 0 000 1.5zm0 0v-3.675A55.378 55.378 0 0112 8.443m-7.007 11.55A5.981 5.981 0 006.75 15.75v-1.5"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold" style="color:var(--color-text)">Welcome back</h1>
    <p class="text-sm mt-1" style="color:var(--color-text-muted)">Sign in to your SchoolMS account</p>
  </div>

  <!-- Card -->
  <div class="rounded-2xl border p-8 shadow-sm" style="background:var(--color-surface);border-color:var(--color-border)">

    {% if error %}
    <div class="mb-5 flex items-center gap-3 px-4 py-3 rounded-xl border text-sm
                bg-red-50 border-red-200 text-red-700
                dark:bg-red-900/20 dark:border-red-800 dark:text-red-300"
         role="alert" data-auto-dismiss="8000">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login" class="space-y-5" data-loading novalidate>
      <div>
        <label for="email" class="block text-sm font-medium mb-1.5" style="color:var(--color-text-secondary)">Email address</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none" style="color:var(--color-text-muted)">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
            </svg>
          </span>
          <input id="email" type="email" name="email" required autocomplete="email" placeholder="you@school.edu"
                 class="input-field pl-9"
                 style="padding-left:2.25rem">
        </div>
      </div>

      <div>
        <label for="password" class="block text-sm font-medium mb-1.5" style="color:var(--color-text-secondary)">Password</label>
        <div class="password-wrapper">
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none" style="color:var(--color-text-muted)">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
              </svg>
            </span>
            <input id="password" type="password" name="password" required autocomplete="current-password" placeholder="••••••••"
                   class="input-field"
                   style="padding-left:2.25rem;padding-right:2.75rem">
          </div>
          <button type="button" class="password-toggle" data-password-toggle="password"
                  aria-label="Show password">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" id="login-btn"
              class="w-full py-3 px-4 rounded-xl font-semibold text-sm text-white
                     bg-gradient-to-r from-primary-600 to-primary-700
                     hover:from-primary-700 hover:to-primary-800
                     active:scale-[0.98] transition-all shadow-lg shadow-primary-500/25
                     focus-visible:outline focus-visible:outline-2 focus-visible:outline-primary-500 focus-visible:outline-offset-2"
              data-loading-text="Signing in…">
        Sign In
      </button>
    </form>
  </div>

  <!-- Theme toggle -->
  <div class="mt-6 text-center">
    <button onclick="ThemeManager.toggle()" data-theme-toggle
            class="inline-flex items-center gap-2 text-xs px-3 py-1.5 rounded-lg transition-all"
            style="color:var(--color-text-muted)" aria-label="Toggle dark mode">
      <span data-theme-icon style="width:14px;height:14px;display:flex;align-items:center">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor" class="w-3.5 h-3.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/>
        </svg>
      </span>
      Toggle dark mode
    </button>
  </div>

</div>
{% endblock %}
