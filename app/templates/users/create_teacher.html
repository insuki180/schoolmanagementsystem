{% extends "base.html" %}
{% block title %}Create Teacher — SchoolMS{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto fade-in">
    <div class="mb-6">
        <a href="/dashboard" class="text-primary-600 text-sm hover:underline">← Back</a>
        <h1 class="text-2xl font-bold text-slate-800 mt-2">Create Teacher</h1>
    </div>
    {% if error %}<div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm">⚠️ {{ error }}</div>{% endif %}
    <form method="POST" action="/users/create-teacher" class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 space-y-5">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Full Name</label>
            <input type="text" name="name" required class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-primary-400 outline-none transition-all text-sm">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
            <input type="email" name="email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-primary-400 outline-none transition-all text-sm">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
            <input type="password" name="password" required minlength="6" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-primary-400 outline-none transition-all text-sm">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Phone</label>
            <input type="text" name="phone" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-primary-400 outline-none transition-all text-sm">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Assign Classes</label>
            <div class="grid grid-cols-2 gap-2">
                {% for cls in classes %}
                <label class="flex items-center gap-2 px-3 py-2 rounded-lg border border-slate-200 hover:bg-slate-50 cursor-pointer">
                    <input type="checkbox" name="class_ids" value="{{ cls.id }}" class="rounded border-slate-300 text-primary-600">
                    <span class="text-sm text-slate-700">{{ cls.name }}</span>
                </label>
                {% endfor %}
            </div>
        </div>
        <button type="submit" class="w-full py-3 bg-gradient-to-r from-primary-600 to-primary-700 text-white font-semibold rounded-xl hover:from-primary-700 hover:to-primary-800 transition-all shadow-lg shadow-primary-500/25 active:scale-[0.98]">Create Teacher</button>
    </form>
</div>
{% endblock %}
